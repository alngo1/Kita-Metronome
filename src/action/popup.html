<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Manual Toggle</h3>
    <button id="metronomeBtn">Start Metronome</button>

    <h3>Edit Audio Speed</h3>
    <input type="range" id="BPM" name="BPM" min="0" max="240" />
    <label for="BPM">BPM</label>
    
    <input type="range" id="offset" name="offset" min="0" max="240" />
    <label for="offset">offset</label>

    <h3>Edit Video Speed</h3>
    <ul>
        <li>
            <button>0.25</button>
        </li>
        <li>
            <button>0.50</button>
        </li>
        <li>
            <button>0.75</button>
        </li>
        <li>
            <button>1.00</button>
        </li>
        <li>
            <button>1.25</button>
        </li>
        <li>
            <button>1.50</button>
        </li>
        <li>
            <button>1.75</button>
        </li>
        <li>
            <button>2.00</button>
        </li>
    </ul>

    <audio id="metAudio" src="../../audio/tam 4-4time 120bpm 1min.mp3"  loop></audio>
    <script src="./action.js"></script>
</body>
</html>
